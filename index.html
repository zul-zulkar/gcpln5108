<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Monitoring FASIH – BPS Kabupaten Buleleng</title>
  <link rel="stylesheet" href="style.css" />

  <script>
    /* ── Theme init — runs before render to avoid flash ── */
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</head>
<body>

<header>
  <div class="hdr-left">
    <div class="hdr-icon">📊</div>
    <div class="hdr-title">
      <h1>Dashboard Monitoring GC PLN</h1>
      <p>BPS Kabupaten Buleleng &nbsp;·&nbsp; [55UTR] &nbsp;·&nbsp; Pascabayar &amp; Prabayar</p>
    </div>
  </div>
  <button id="mobileMenuBtn" onclick="toggleMobileMenu()" aria-label="Buka menu" aria-expanded="false">
    <span class="hbg-bar"></span>
    <span class="hbg-bar"></span>
    <span class="hbg-bar"></span>
  </button>
  <div class="hdr-right">
    <div class="hdr-group">
      <span id="lastUpdated">–</span>
      <button class="btn-refresh" id="btnRefresh" onclick="loadData();loadRingkasan();loadRiwayat()">
        <span id="refreshIcon">🔄</span><span class="btn-text"> Refresh</span>
      </button>
    </div>
    <div class="hdr-sep"></div>
    <div class="hdr-group">
      <button class="btn-refresh" id="btnSettings" onclick="toggleSettings()" title="Ganti sumber data">
        ⚙️ <span class="btn-text">Sumber Data</span>
      </button>
      <button class="btn-theme" id="btnTheme" onclick="toggleTheme()" title="Toggle dark/light mode">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </div>
</header>

<div id="settingsPanel" style="background:var(--header-from); border-top:1px solid rgba(255,255,255,.15);">
  <div style="display:flex; flex-wrap:wrap; align-items:flex-end; gap:.75rem; max-width:900px;">
    <div style="flex:1; min-width:260px;">
      <label style="color:rgba(255,255,255,.75); font-size:.72rem; font-weight:600; display:block; margin-bottom:.3rem;">
        URL Google Sheets <span style="font-weight:400; opacity:.8;">(tempel URL spreadsheet — tab mana saja)</span>
      </label>
      <input id="cfgUrlSheet" type="text" placeholder="https://docs.google.com/spreadsheets/d/…/edit"
        style="width:100%; padding:.38rem .6rem; border-radius:6px; border:1px solid rgba(255,255,255,.3);
               background:rgba(255,255,255,.12); color:#fff; font-size:.8rem;" />
    </div>
    <div style="display:flex; gap:.5rem; align-items:center;">
      <button class="btn-refresh" onclick="saveSheetConfig()" style="background:rgba(16,185,129,.8); border-color:rgba(16,185,129,.9);">
        💾 Simpan &amp; Muat
      </button>
      <button class="btn-refresh" onclick="resetSheetConfig()" style="background:rgba(255,255,255,.12);" title="Kembali ke sumber data default">
        ↺ Default
      </button>
    </div>
    <div id="cfgMsg" style="font-size:.75rem; color:rgba(255,255,255,.7); width:100%;"></div>

    <!-- Accent color row -->
    <div style="width:100%; border-top:1px solid rgba(255,255,255,.12); padding-top:.6rem;">
      <label style="color:rgba(255,255,255,.75); font-size:.72rem; font-weight:600; display:block; margin-bottom:.45rem;">
        Warna Aksen
      </label>
      <div style="display:flex; flex-wrap:wrap; gap:.45rem; align-items:center;">
        <button class="accent-swatch" data-accent="blue"   onclick="selectAccent('blue')"   style="background:#1F4E79;" title="Biru (Default)"></button>
        <button class="accent-swatch" data-accent="teal"   onclick="selectAccent('teal')"   style="background:#0D6E6E;" title="Teal"></button>
        <button class="accent-swatch" data-accent="green"  onclick="selectAccent('green')"  style="background:#065F46;" title="Hijau"></button>
        <button class="accent-swatch" data-accent="purple" onclick="selectAccent('purple')" style="background:#4C1D95;" title="Ungu"></button>
        <button class="accent-swatch" data-accent="rose"   onclick="selectAccent('rose')"   style="background:#881337;" title="Merah"></button>
        <button class="accent-swatch" data-accent="orange" onclick="selectAccent('orange')" style="background:#7c2d12;" title="Oranye"></button>
        <button class="accent-swatch" data-accent="slate"  onclick="selectAccent('slate')"  style="background:#1e293b;" title="Abu"></button>
        <label style="display:flex; align-items:center; gap:.35rem; cursor:pointer; margin-left:.2rem;">
          <input type="color" id="accentCustomColor" value="#1F4E79"
            style="width:26px; height:26px; padding:1px; border:2px solid rgba(255,255,255,.35);
                   border-radius:6px; cursor:pointer; background:none;" title="Warna kustom" />
          <span style="color:rgba(255,255,255,.7); font-size:.7rem;">Kustom</span>
        </label>
        <button class="btn-refresh" onclick="resetAccent()" style="background:rgba(255,255,255,.12); font-size:.7rem; padding:.2rem .55rem;" title="Kembali ke warna default">
          ↺ Reset
        </button>
      </div>
    </div>
  </div>
</div>

<main>
  <div id="errBox"></div>
  <div id="content">
    <div class="loading-box">
      <div class="loader"></div>
      <p>Memuat data dari Google Sheets…</p>
    </div>
  </div>
  <div id="ringkasanSection"></div>
  <div id="riwayatSection"></div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-logo-row">
      <div class="footer-logo-icon">📊</div>
      <div class="footer-title">
        Dashboard Monitoring
        <span>GC PLN</span>
      </div>
    </div>
    <div class="footer-divider"></div>
    <p class="footer-copy">&copy; <script>document.write(new Date().getFullYear())</script> BPS Kabupaten Buleleng</p>
  </div>
</footer>

<button id="scrollTop" title="Ke atas" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8679;</button>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
